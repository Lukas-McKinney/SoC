name: Build Release Packages

on:
  workflow_dispatch:
    inputs:
      publishRelease:
        description: "Publish a GitHub Release from this run"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      releaseTag:
        description: "Release tag to create/use when publishRelease=true (example: v0.1.0)"
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-raylib
            mingw-w64-x86_64-pkgconf

      - name: Compute package version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") {
            $version = "${{ github.ref_name }}"
          } elseif ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ github.event.inputs.releaseTag }}" -ne "") {
            $version = "${{ github.event.inputs.releaseTag }}"
          } else {
            $version = "dev-${{ github.run_number }}"
          }
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build game (Windows)
        shell: msys2 {0}
        run: mingw32-make RAYLIB_INCLUDE=/mingw64/include RAYLIB_LIB=/mingw64/lib

      - name: Package game (Windows)
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/package_windows.ps1 -Version "${{ steps.version.outputs.value }}" -RaylibDllPath "C:\msys64\mingw64\bin\raylib.dll"

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: |
            dist/*.zip
            dist/*.sha256.txt

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install raylib pkg-config

      - name: Compute package version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.releaseTag }}" ]]; then
            VERSION="${{ github.event.inputs.releaseTag }}"
          else
            VERSION="dev-${GITHUB_RUN_NUMBER}"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build game (macOS)
        run: make

      - name: Package game (macOS)
        run: |
          chmod +x scripts/package_macos.sh
          bash scripts/package_macos.sh "${{ steps.version.outputs.value }}"

      - name: Upload macOS package artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: |
            dist/*.zip
            dist/*.sha256.txt

  publish-release:
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publishRelease == 'true' && github.event.inputs.releaseTag != '')
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-package
          path: release-assets

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-package
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.releaseTag }}
          files: |
            release-assets/*.zip
            release-assets/*.sha256.txt
          generate_release_notes: true
